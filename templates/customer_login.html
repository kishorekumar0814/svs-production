{% extends "base.html" %}
{% block content %}
<div class="center-card auth-card">
  <div class="auth-head">
    <h2>Customer Login</h2>
    <p>Sign in to view orders, status updates, and bills.</p>
  </div>
  <form method="post" class="auth-form">
    <div class="form-field">
      <label>Email or CUID</label>
      <input type="text" name="identifier" placeholder="Enter email or CUID" autocomplete="username" required>
    </div>
    <div class="form-field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
    </div>
    <div class="form-actions auth-actions">
      <button class="btn auth-submit" type="submit">Login</button>
      <div class="auth-links">
        <a href="{{ url_for('customer_signup') }}" class="btn-link auth-link-gap">Create an account</a>
        <a href="{{ url_for('customer_forgot_password') }}" class="btn-link">Forgot Password?</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
