{% extends "base.html" %}
{% block content %}
<div class="center-card auth-card">
  <div class="auth-head">
    <h2>Customer Sign Up</h2>
    <p>Create your account to place and track grocery orders.</p>
  </div>
  <form method="post" class="auth-form">
    <div class="form-field">
      <label>Name</label>
      <input type="text" name="name" placeholder="Enter full name" autocomplete="name" required>
    </div>
    <div class="form-field">
      <label>Email</label>
      <input type="email" name="email" placeholder="Enter email address" autocomplete="email" required>
    </div>
    <div class="form-field">
      <label>Mobile</label>
      <input type="text" name="mobile" placeholder="Enter mobile number" autocomplete="tel" required>
    </div>
    <div class="form-field">
      <label>Address</label>
      <textarea name="address" placeholder="Enter address"></textarea>
    </div>
    <div class="form-field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Create password" autocomplete="new-password" required>
    </div>
    <div class="form-actions auth-actions">
      <button class="btn auth-submit auth-submit-wide" type="submit">Create Account</button>
      <div class="auth-links auth-links-inline">
        <span>Already have an account?</span>
        <a href="{{ url_for('customer_login') }}" class="btn-link">Login</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
