{% extends "base.html" %}
{% block content %}
<div class="center-card error-card">
  <h2>No Internet Connection</h2>
  <h3>Please check your network</h3>
  <p>You appear to be offline. Reconnect to the internet and try again.</p>
  <div class="form-actions">
    <button class="btn" type="button" onclick="window.location.reload()">Try Again</button>
    <a class="btn-link" href="{{ url_for('home') }}">Open Home</a>
  </div>
</div>
{% endblock %}
